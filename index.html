<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Manager · Bormioli Luigi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Open+Sans:wght@300;400;600;700&display=swap');
:root{
  --bl-blue:#1a4b8c; --bl-blue2:#1e5ea8; --bl-gray:#7a8a96;
  --c1:#2baac8; --c2:#26b8bc; --c-green:#3aaa37; --c-red:#d05050; --c-warn:#c49a20;
  --bg:#fff; --bg2:#f7f9fb; --bg3:#eef2f5;
  --border:#dde4ea; --border2:#c8d3da;
  --text:#1a2e35; --text2:#5a7a85; --text3:#9ab5bd;
  --al1-bg:#fffbe6; --al1-bd:#f5c518; --al1-tx:#7a5c00;
  --al2-bg:#fff3e0; --al2-bd:#e8943a; --al2-tx:#7a3a00;
  --al3-bg:#ffeaea; --al3-bd:#d05050; --al3-tx:#6b1a1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* HEADER */
.header{background:#fff;border-bottom:2px solid var(--bl-blue);padding:0 24px;display:flex;align-items:center;gap:20px;height:60px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(26,75,140,.1);}
.logo-wrap img{height:36px;display:block;}
.header-divider{width:1px;height:32px;background:var(--border);flex-shrink:0;}
.header-tabs{display:flex;gap:2px;flex:1;}
.tab{padding:7px 14px;border-radius:5px;cursor:pointer;color:var(--bl-gray);font-size:12px;font-weight:600;transition:all .15s;border:1px solid transparent;font-family:'Open Sans',sans-serif;letter-spacing:.1px;}
.tab:hover{color:var(--bl-blue);background:rgba(26,75,140,.05);}
.tab.active{color:var(--bl-blue);background:rgba(26,75,140,.08);border-color:rgba(26,75,140,.2);}
.header-right{display:flex;gap:8px;align-items:center;}
.btn{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Open Sans',sans-serif;white-space:nowrap;transition:all .15s;border:1px solid var(--border2);background:#fff;color:var(--text2);}
.btn:hover{border-color:var(--bl-blue);color:var(--bl-blue);}
.btn-primary{background:var(--bl-blue);color:#fff;border-color:var(--bl-blue);}
.btn-primary:hover{background:var(--bl-blue2);border-color:var(--bl-blue2);}
#file-input{display:none;}

/* MAIN */
.main{padding:18px 24px;}

/* KPI */
.kpi-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:#fff;border:1px solid var(--border);border-radius:7px;padding:13px 16px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.kpi:nth-child(1)::after{background:var(--bl-blue);}
.kpi:nth-child(2)::after{background:var(--c2);}
.kpi:nth-child(3)::after{background:var(--c-green);}
.kpi:nth-child(4)::after{background:var(--border2);}
.kpi:nth-child(5)::after{background:var(--c-red);}
.kpi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;font-weight:600;}
.kpi-value{font-family:DM Mono,monospace;font-size:22px;font-weight:500;}
.kv-bl{color:var(--bl-blue);} .kv-c2{color:var(--c2);} .kv-gr{color:var(--c-green);} .kv-rd{color:var(--c-red);}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.filter-group{display:flex;align-items:center;gap:6px;}
.filter-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;font-weight:600;}
input[type=text],select{background:#fff;border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:5px;font-size:12px;font-family:'Open Sans',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;}
input[type=text]:focus,select:focus{border-color:var(--bl-blue);box-shadow:0 0 0 3px rgba(26,75,140,.1);}
input[type=text]{width:200px;} select{cursor:pointer;}
.toolbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.lines-count{font-size:11px;color:var(--text2);font-family:DM Mono,monospace;}

/* ALERT LEGEND */
.alert-legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px;padding:7px 10px;background:var(--bg2);border-radius:5px;border:1px solid var(--border);}
.alert-pip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:600;}
.pip{width:9px;height:9px;border-radius:50%;}
.pip.ok{background:var(--c-green);} .pip.a1{background:var(--al1-bd);} .pip.a2{background:var(--al2-bd);} .pip.a3{background:var(--al3-bd);}

/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:7px;overflow:auto;max-height:calc(100vh - 290px);box-shadow:0 1px 4px rgba(26,75,140,.05);}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{position:sticky;top:0;z-index:10;}
th{background:var(--bg2);color:var(--text2);font-weight:700;text-align:left;padding:0;white-space:nowrap;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.5px;user-select:none;position:relative;}
.th-inner{display:flex;align-items:center;gap:4px;padding:9px 13px;cursor:pointer;}
.th-inner:hover{color:var(--bl-blue);}
th.sorted .th-inner{color:var(--bl-blue);}
.col-filter-btn{width:18px;height:18px;border-radius:3px;border:1px solid var(--border2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);transition:all .12s;flex-shrink:0;margin-right:2px;}
.col-filter-btn:hover,.col-filter-btn.active{background:var(--bl-blue);color:#fff;border-color:var(--bl-blue);}

/* COLUMN DROPDOWN */
.col-dropdown{position:absolute;top:100%;left:0;z-index:300;background:#fff;border:1px solid var(--border2);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:180px;padding:6px 0;display:none;}
.col-dropdown.open{display:block;}
.col-dropdown input[type=text]{width:calc(100% - 12px);margin:4px 6px;padding:5px 8px;font-size:11px;}
.col-dd-item{padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text);display:flex;align-items:center;gap:7px;transition:background .1s;}
.col-dd-item:hover{background:rgba(26,75,140,.05);}
.col-dd-item input[type=checkbox]{accent-color:var(--bl-blue);cursor:pointer;width:13px;height:13px;}
.col-dd-actions{display:flex;gap:6px;padding:6px 10px;border-top:1px solid var(--border);margin-top:4px;}
.col-dd-actions .btn{padding:3px 10px;font-size:11px;}

td{padding:8px 13px;border-bottom:1px solid var(--border);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(26,75,140,.02);}
tr.al1 td{background:var(--al1-bg)!important;} tr.al2 td{background:var(--al2-bg)!important;} tr.al3 td{background:var(--al3-bg)!important;}

.mono{font-family:DM Mono,monospace;} .dim{color:var(--text2);}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.badge-ped{background:rgba(26,75,140,.1);color:var(--bl-blue);}
.badge-mas{background:rgba(38,184,188,.1);color:var(--c2);}
.badge-open{background:rgba(58,170,55,.1);color:var(--c-green);}
.badge-gray{background:var(--bg3);color:var(--text2);}
.badge-expedir{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;white-space:nowrap;}
.badge-parcial{background:#fff8e1;color:#f57f17;border:1px solid #ffe082;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;white-space:nowrap;}
.badge-reprocesar{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;white-space:nowrap;}
.badge-sinstock{background:#f3e5f5;color:#6a1b9a;border:1px solid #ce93d8;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;white-space:nowrap;}
.badge-revisar{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;white-space:nowrap;}
.action-tip{font-size:10px;color:var(--text2);margin-top:2px;}
.group-row td{background:var(--bg2)!important;font-weight:700;border-top:2px solid var(--bl-blue);border-bottom:1px solid var(--border2);}
.group-row:hover td{background:var(--bg3)!important;}
.group-row .g-mat{font-family:DM Mono,monospace;font-size:12px;color:var(--bl-blue);font-weight:700;}
.group-row .g-desc{font-size:12px;color:var(--text);}
.group-row .g-num{font-family:DM Mono,monospace;font-size:12px;font-weight:700;}
.group-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;}
.group-toggle .arrow{font-size:10px;transition:transform .15s;display:inline-block;}
.group-toggle.open .arrow{transform:rotate(90deg);}
.child-row td{background:#fff!important;padding-left:28px!important;}
.child-row.hidden{display:none;}
.group-action-summary{display:flex;gap:5px;flex-wrap:wrap;}
.cov-bar{display:flex;align-items:center;gap:6px;}
.cov-pill{height:3px;border-radius:2px;background:var(--border);width:40px;overflow:hidden;flex-shrink:0;}
.cov-fill{height:100%;border-radius:2px;}

/* COBERTURA */
.cob-grid{display:grid;gap:8px;}
.cob-card{background:#fff;border:1px solid var(--border);border-radius:7px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.cob-card.al1{border-left:3px solid var(--al1-bd);} .cob-card.al2{border-left:3px solid var(--al2-bd);} .cob-card.al3{border-left:3px solid var(--al3-bd);}
.cob-card-header{display:grid;grid-template-columns:152px 1fr 105px 105px 85px 105px;gap:10px;padding:11px 14px;align-items:center;background:var(--bg2);cursor:pointer;transition:background .12s;}
.cob-card.al1 .cob-card-header{background:var(--al1-bg);} .cob-card.al2 .cob-card-header{background:var(--al2-bg);} .cob-card.al3 .cob-card-header{background:var(--al3-bg);}
.cob-card-header:hover{filter:brightness(.97);}
.cob-mat{font-family:DM Mono,monospace;font-size:11px;color:var(--bl-blue);font-weight:600;}
.cob-desc{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cob-stat{text-align:right;} .cob-stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600;}
.cob-stat-val{font-family:DM Mono,monospace;font-size:13px;}
.cob-months{padding:12px 14px;display:none;background:#fff;}
.cob-months.open{display:block;}
.month-header{display:grid;grid-template-columns:78px 1fr 1fr 1fr 1fr 1fr;gap:8px;padding:3px 0 8px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);margin-bottom:4px;font-weight:700;}
.month-header div,.month-row div{text-align:right;} .month-header div:first-child,.month-row div:first-child{text-align:left;}
.month-row{display:grid;grid-template-columns:78px 1fr 1fr 1fr 1fr 1fr;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.month-row:last-child{border-bottom:none;}
.month-label{font-family:DM Mono,monospace;font-size:11px;color:var(--text2);}
.month-val{font-family:DM Mono,monospace;}
.cob-tabs{display:flex;gap:4px;margin-bottom:14px;}
.cob-tab{padding:6px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;border:1px solid var(--border2);background:#fff;color:var(--text2);transition:all .15s;}
.cob-tab:hover{border-color:var(--bl-blue);color:var(--bl-blue);}
.cob-tab.active{background:var(--bl-blue);color:#fff;border-color:var(--bl-blue);}
.cob-tipo-def{display:inline-block;padding:1px 7px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(26,75,140,.1);color:var(--bl-blue);}
.cob-tipo-prov{display:inline-block;padding:1px 7px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(193,145,30,.12);color:#8a6000;}
.cob-tipo-tn{display:inline-block;padding:1px 7px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(38,184,188,.1);color:var(--c2);}
.tn-card{background:#fff;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:8px;}
.tn-card.al1{border-left:3px solid var(--al1-bd);}
.tn-card.al2{border-left:3px solid var(--al2-bd);}
.tn-card.al3{border-left:3px solid var(--al3-bd);}
.tn-header{display:grid;grid-template-columns:110px 140px 110px 110px 110px 80px 105px 115px;gap:8px;padding:10px 14px;align-items:center;background:var(--bg2);cursor:pointer;transition:background .12s;}
.tn-header:hover{background:var(--bg3);}
.tn-code{font-family:DM Mono,monospace;font-size:12px;color:var(--bl-blue);font-weight:700;}
.tn-body{display:none;padding:8px 14px 12px;}
.tn-body.open{display:block;}
.tn-table{width:100%;border-collapse:collapse;font-size:11px;}
.tn-table th{background:var(--bg3);padding:6px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);font-weight:700;border-bottom:1px solid var(--border);text-align:left;}
.tn-table th.r{text-align:right;}
.tn-table td{padding:5px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.tn-table td.r{text-align:right;font-family:DM Mono,monospace;}
.tn-table tr:last-child td{border-bottom:none;}
.save-btn{background:#2e7d32;color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Open Sans',sans-serif;transition:background .15s;}
.save-btn:hover{background:#1b5e20;}
.save-ok{color:#2e7d32;font-size:11px;font-family:DM Mono,monospace;margin-left:6px;display:none;}

/* CONFIG */
.config-section{margin-bottom:20px;}
.config-section h3{font-size:11px;color:var(--bl-blue);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;font-weight:700;padding-bottom:6px;border-bottom:2px solid var(--bl-blue);display:inline-block;}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:800px){.config-grid{grid-template-columns:1fr;}}
.config-panel{background:#fff;border:1px solid var(--border);border-radius:7px;padding:18px;}
.config-panel p{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.55;}
.alert-config{display:flex;flex-direction:column;gap:8px;}
.alert-row-cfg{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:6px;border:1px solid;}
.alert-row-cfg.a1{background:var(--al1-bg);border-color:var(--al1-bd);}
.alert-row-cfg.a2{background:var(--al2-bg);border-color:var(--al2-bd);}
.alert-row-cfg.a3{background:var(--al3-bg);border-color:var(--al3-bd);}
.alert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.a1 .alert-dot{background:var(--al1-bd);} .a2 .alert-dot{background:var(--al2-bd);} .a3 .alert-dot{background:var(--al3-bd);}
.a1 .alert-label-txt{color:var(--al1-tx);} .a2 .alert-label-txt{color:var(--al2-tx);} .a3 .alert-label-txt{color:var(--al3-tx);}
.alert-label-txt{font-size:12px;flex:1;font-weight:600;}
.alert-inp{width:62px!important;text-align:center;padding:4px 6px!important;font-family:DM Mono,monospace!important;font-size:12px!important;}
.alert-unit{font-size:11px;color:var(--text2);}

/* STOCK SEG */
.seg-toolbar{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
.seg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:6px;max-height:320px;overflow-y:auto;margin-bottom:10px;}
.seg-item{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg2);border-radius:5px;border:1px solid var(--border);}
.seg-mat{font-family:DM Mono,monospace;font-size:11px;color:var(--bl-blue);flex:0 0 148px;font-weight:600;}
.seg-name{font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.seg-qty{font-family:DM Mono,monospace;font-size:11px;color:var(--text2);width:60px;text-align:right;flex-shrink:0;}
.seg-input{width:82px;text-align:right;background:#fff!important;border:1px solid var(--border2)!important;color:var(--bl-blue)!important;border-radius:4px;padding:4px 7px!important;font-family:DM Mono,monospace!important;font-size:11px!important;outline:none;}
.seg-input:focus{border-color:var(--c2)!important;box-shadow:0 0 0 2px rgba(38,184,188,.12)!important;}
.seg-del{width:20px;height:20px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.seg-del:hover{background:var(--al3-bg);color:var(--c-red);}

/* PASTE AREA */
.paste-area{border:1px solid var(--border2);border-radius:6px;overflow:hidden;margin-bottom:10px;}
.paste-area-header{background:var(--bg2);padding:8px 12px;font-size:11px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:between;gap:8px;}
.paste-table-wrap{overflow:auto;max-height:200px;}
.paste-table{width:100%;border-collapse:collapse;font-size:12px;}
.paste-table th{background:var(--bg3);padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:700;border-bottom:1px solid var(--border);text-align:left;}
.paste-table td{padding:5px 10px;border-bottom:1px solid var(--border);}
.paste-table tr:last-child td{border-bottom:none;}
.paste-table input{border:none;background:transparent;font-family:DM Mono,monospace;font-size:11px;color:var(--text);width:100%;outline:none;padding:1px 2px;}
.paste-table input:focus{background:rgba(26,75,140,.05);border-radius:2px;}

/* PAGINATION */
.pagination{display:flex;align-items:center;gap:6px;margin-top:12px;justify-content:flex-end;}
.page-btn{background:#fff;border:1px solid var(--border2);color:var(--text2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-family:'Open Sans',sans-serif;transition:all .12s;}
.page-btn:hover{border-color:var(--bl-blue);color:var(--bl-blue);}
.page-btn.active{background:rgba(26,75,140,.08);border-color:var(--bl-blue);color:var(--bl-blue);font-weight:700;}
.page-btn:disabled{opacity:.3;cursor:not-allowed;}
.page-info{font-size:11px;color:var(--text2);font-family:DM Mono,monospace;margin-right:4px;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--bl-blue);}
.cob-config-bar{background:#fff;border:1px solid var(--border);border-radius:7px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(26,75,140,.05);}
.cob-config-inp{width:70px;text-align:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--bl-blue);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;background:#fff;outline:none;}
.cob-config-inp:focus{border-color:var(--bl-blue);box-shadow:0 0 0 3px rgba(26,75,140,.1);}
.cob-stat-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;}
.cob-stat-badge.ok{background:rgba(58,170,55,.1);color:var(--c-green);}
.cob-stat-badge.warn{background:var(--al1-bg);color:var(--al1-tx);}
.cob-stat-badge.danger{background:var(--al3-bg);color:var(--al3-tx);}
.cob-stat-badge.info{background:rgba(26,75,140,.08);color:var(--bl-blue);}
.repro-pill{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(255,107,53,.12);color:#c84800;border:1px solid rgba(255,107,53,.3);}
.cob-filter-btn{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:#fff;color:var(--text2);transition:all .12s;font-family:'Open Sans',sans-serif;}
.cob-filter-btn:hover{border-color:var(--bl-blue);color:var(--bl-blue);}
.cob-filter-btn.active{background:var(--bl-blue);color:#fff;border-color:var(--bl-blue);}
</style>
</head>

function loadFromAPI() {
  var btn = document.getElementById('api-refresh-btn');
  if(btn) { btn.textContent = '⟳ Cargando...'; btn.disabled = true; }
  isLoadingFromAPI = true;

  fetch(API_URL)
    .then(function(r){ return r.json(); })
    .then(function(data){
      // Build DB from API response
      var newDB = { inventory: {}, pedidos: [], master: [] };

      // Inventory
      if(data.inventory){
        Object.keys(data.inventory).forEach(function(mat){
          var a = data.inventory[mat];
          newDB.inventory[mat] = {
            desc: a.desc||'',
            stock_ok: a.stock_ok||0,
            stock_ko: a.stock_ko||0,
            media_mes: a.media_mes||0
          };
        });
      }

      // Pedidos
      if(data.pedidos) newDB.pedidos = data.pedidos;

      // Master
      if(data.master) newDB.master = data.master;

      // Update AZQ inventory from tipo + inventory
      if(data.tipo && data.inventory){
        var newAzq = [];
        Object.keys(data.inventory).forEach(function(mat){
          var inv = data.inventory[mat];
          if(!inv.plant || inv.plant.toLowerCase().indexOf('azuq')===-1) return;
          var tn = String(inv.tn||'').trim();
          if(!/^\d{6}$/.test(tn)) return;
          var t = data.tipo[mat] || {};
          var tipo = t.tipo || inv.estado || '';
          var tipoFinal = '';
          if(tipo==='DEFINITIVO') tipoFinal='DEFINITIVO';
          else if(tipo==='PROVISIONAL'||tipo==='') tipoFinal='PROVISIONAL';
          else return;
          newAzq.push({
            mat: mat, desc: inv.desc||'', mto: inv.mto||'', tn: tn,
            tipo: tipoFinal,
            ok: inv.stock_ok||0, ko: inv.stock_ko||0, media: inv.media_mes||0
          });
        });
        if(newAzq.length > 0) window._AZQ_UPDATED = newAzq;
      }

      DB = newDB;
      colFilters = {};
      render();

      var ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('es-ES') : '';
      if(btn){ btn.textContent = '⟳ Sincronizado ' + ts; btn.disabled = false; }
      var ok = document.getElementById('save-ok');
      if(ok){ ok.textContent = '✔ Datos actualizados desde Sheets'; ok.style.display='inline'; ok.style.color='var(--c-green)'; setTimeout(function(){ok.style.display='none';}, 3000); }
    })
    .catch(function(err){

// ---------- EXCEL LOADER ----------
function loadExcel(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const n={inventory:{},pedidos:[],master:[]};
      if(wb.SheetNames.includes('Stock inventory')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Stock inventory'],{header:1,defval:null});
        // New format: A=mat,B=desc,C=mto_std,D=plant,E=tn,H=sp_ok,I=sp_ko,K=media,M=estado
        for(let i=1;i<rows.length;i++){
          const r=rows[i],mat=r[0]?String(r[0]).trim():null;
          if(!mat||![11,15].includes(mat.length))continue;
          n.inventory[mat]={desc:r[1]||'',stock_ok:parseFloat(r[7])||0,stock_ko:parseFloat(r[8])||0,media_mes:parseFloat(r[10])||0};
        }
        // Also update AZQ_INV from Tipo de codice + Stock inventory
        if(wb.SheetNames.includes('Tipo de codice')){
          const tipoRows=XLSX.utils.sheet_to_json(wb.Sheets['Tipo de codice'],{header:1,defval:null});
          const tipoMap={};
          for(let i=1;i<tipoRows.length;i++){
            const r=tipoRows[i];
            if(r[0])tipoMap[String(r[0]).trim()]={tipo:r[2]||'',tn:r[3]||''};
          }
          const newAzq=[];
          for(let i=1;i<rows.length;i++){
            const r=rows[i];
            const mat=r[0]?String(r[0]).trim():'';
            if(!mat||![11,15].includes(mat.length))continue;
            const plant=r[3]?String(r[3]).trim():'';
            if(!plant.toLowerCase().includes('azuq'))continue;
            const mtoStd=r[2]?String(r[2]).trim():'';
            const tn=r[4]?String(r[4]).trim():'';
            if(!/^\d{6}$/.test(tn))continue;
            const t=tipoMap[mat]||{};
            const tipo=t.tipo||r[12]||'';
            let tipoFinal='';
            if(tipo==='DEFINITIVO')tipoFinal='DEFINITIVO';
            else if(tipo==='PROVISIONAL'||tipo==='')tipoFinal='PROVISIONAL';
            else continue;
            newAzq.push({mat:mat,desc:r[1]||'',mto:mtoStd,tn:tn,tipo:tipoFinal,ok:parseFloat(r[7])||0,ko:parseFloat(r[8])||0,media:parseFloat(r[10])||0});
          }
          if(newAzq.length>0){
            // Replace global AZQ_INV
            window._AZQ_UPDATED=newAzq;
          }
        }
      }
      if(wb.SheetNames.includes('Pedidos de venta clientes')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Pedidos de venta clientes'],{header:1,defval:null,cellDates:true});
        // Cols: A(0)=doc,B(1)=pos,C(2)=mat,D(3)=desc,E(4)=grupo,F(5)=qty,G(6)=estado,H(7)=fecha
        for(let i=1;i<rows.length;i++){
          const r=rows[i];
          const colE=r[4]?String(r[4]).trim():'';
          if(colE!=='PF Home & Professnl')continue;
          const mat=r[2]?String(r[2]).trim():'';
          if(!mat||![11,15].includes(mat.length))continue;
          const f=r[7];let mes='Sin fecha',fr='';
          if(f instanceof Date){mes=f.getFullYear()+'-'+String(f.getMonth()+1).padStart(2,'0');fr=String(f.getDate()).padStart(2,'0')+'/'+String(f.getMonth()+1).padStart(2,'0')+'/'+f.getFullYear();}
          n.pedidos.push({doc:String(r[0]||''),pos:String(r[1]||''),mat,desc:r[3]||'',qty:parseFloat(r[5])||0,estado:r[6]||'',fecha:mes,fecha_raw:fr,origen:'Pedidos'});
        }
      }
      if(wb.SheetNames.includes('Stock Master')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Stock Master'],{header:1,defval:null,cellDates:true});
        for(let i=1;i<rows.length;i++){
          const r=rows[i],mat=r[1]?String(r[1]).trim():'';
          if(!mat||![11,15].includes(mat.length))continue;
          const f=r[6];let mes='Sin fecha',fr='';
          if(f instanceof Date){mes=f.getFullYear()+'-'+String(f.getMonth()+1).padStart(2,'0');fr=String(f.getDate()).padStart(2,'0')+'/'+String(f.getMonth()+1).padStart(2,'0')+'/'+f.getFullYear();}
          n.master.push({doc:String(r[0]||''),pos:String(r[3]||''),mat,desc:r[2]||'',qty:parseFloat(r[8])||0,estado:'',fecha:mes,fecha_raw:fr,origen:'Stock Master'});
        }
      }
      if(n.pedidos.length>0||n.master.length>0){
        // Duplicate detection: compare with existing DB
        if(DB.pedidos.length>0||DB.master.length>0){
          // Build unique key: doc+pos+mat
          const existingKeys=new Set([...DB.pedidos,...DB.master].map(r=>r.doc+'|'+r.pos+'|'+r.mat));
          const newPedDups=n.pedidos.filter(r=>existingKeys.has(r.doc+'|'+r.pos+'|'+r.mat));
          const newPedNew=n.pedidos.filter(r=>!existingKeys.has(r.doc+'|'+r.pos+'|'+r.mat));
          const existingMasKeys=new Set(DB.master.map(r=>r.doc+'|'+r.pos+'|'+r.mat));
          const newMasDups=n.master.filter(r=>existingMasKeys.has(r.doc+'|'+r.pos+'|'+r.mat));
          const newMasNew=n.master.filter(r=>!existingMasKeys.has(r.doc+'|'+r.pos+'|'+r.mat));
          const totalDups=newPedDups.length+newMasDups.length;
          if(totalDups>0){
            // Store pending import for user decision
            pendingImport={n, newPedDups, newPedNew, newMasDups, newMasNew, totalDups};
            showDuplicateModal();
            return;
          }
        }
        // No duplicates or first import
        DB=n;colFilters={};render();
        alert('✔ Cargado: '+n.pedidos.length+' pedidos (PF Home & Professnl) + '+n.master.length+' líneas Master');
      }
      else alert('Sin datos. Verifica nombres de hojas o que existan registros con "PF Home & Professnl" en col E.');
    }catch(ex){alert('Error: '+ex.message);}
  };
  reader.readAsArrayBuffer(file);evt.target.value='';
}

// ---------- HELPERS ----------
function fmtNum(n){if(n===null||n===undefined||isNaN(n))return'—';return Math.round(n).toLocaleString('es-ES');}
function fmtMes(m){if(!m||m==='Sin fecha')return m;const[y,mo]=m.split('-');return['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(mo)]+' '+y;}
function getInv(mat){return DB.inventory[mat]||{desc:'',stock_ok:0,stock_ko:0,media_mes:0};}
function getAllMonths(){const s=new Set();[...DB.pedidos,...DB.master].forEach(r=>{if(r.fecha&&r.fecha!=='Sin fecha')s.add(r.fecha);});return[...s].sort();}
function getAllRows(){return[...DB.pedidos,...DB.master];}
function covColor(c){return c===null?'var(--text3)':c<alertas.a1?'var(--c-red)':c<alertas.a2?'var(--al2-bd)':c<alertas.a3?'var(--al1-bd)':'var(--c-green)';}
function alertClass(c){if(c===null)return'';if(c<alertas.a1)return'al3';if(c<alertas.a2)return'al2';if(c<alertas.a3)return'al1';return'';}

// ---------- EXPORT ----------
function exportExcel(){
  const rows=getFilteredRows();
  const wsD=[['Material','Descripción','Documento','Posición','Fecha entrega','Qty PZ','Origen','Stock OK','Stock KO','Stock Seg.','Cobertura (m)','Acción']];
  rows.forEach(r=>{
    const inv=getInv(r.mat),seg=stockSeguridad[r.mat]||0;
    const cob=inv.media_mes>0?(inv.stock_ok-seg)/inv.media_mes:null;
    const ac=getAccion(r);wsD.push([r.mat,r.desc,r.doc,r.pos,r.fecha_raw||r.fecha,r.qty,r.origen,inv.stock_ok,inv.stock_ko,seg,cob?parseFloat(cob.toFixed(2)):null,ac.label.replace(/[✔♻⚡⚠⛔🔍]/g,'').trim()]);
  });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wsD),'Pedidos');
  const months=getAllMonths();
  const mats={};getAllRows().forEach(r=>{if(!mats[r.mat])mats[r.mat]=r.desc;});
  const cHdr=['Material','Descripción','Stock OK','Stock KO','St.Seg.',...months.map(fmtMes),'Cob.Final'];
  const cD=[cHdr];
  Object.keys(mats).sort().forEach(mat=>{
    const inv=getInv(mat),seg=stockSeguridad[mat]||0;
    const byMonth={};getAllRows().filter(r=>r.mat===mat).forEach(r=>{byMonth[r.fecha]=(byMonth[r.fecha]||0)+r.qty;});
    let stock=inv.stock_ok-seg;
    const mV=months.map(mes=>{stock-=(byMonth[mes]||0);return parseFloat(stock.toFixed(0));});
    cD.push([mat,mats[mat],inv.stock_ok,inv.stock_ko,seg,...mV,inv.media_mes>0?parseFloat((stock/inv.media_mes).toFixed(2)):null]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cD),'Cobertura');
  XLSX.writeFile(wb,'BormioliLuigi_StockExport.xlsx');
}

// ---------- COLUMN FILTER LOGIC ----------
const COL_KEYS=['mat','desc','origen','doc','fecha','qty','stock_ok','stock_ok','stock_ko','seg','cob','estado','accion'];
const COL_LABELS=['Material','Descripción','Origen','Documento','Fecha ent.','Qty PZ','Stock OK','Stock KO','St.Seg.','Cobertura','Estado','Acción'];

function getUniqueVals(col,baseRows){
  const s=new Set();
  baseRows.forEach(r=>{
    let v=r[col];
    if(col==='seg')v=stockSeguridad[r.mat]||0;
    if(col==='stock_ok')v=getInv(r.mat).stock_ok;
    if(col==='stock_ko')v=getInv(r.mat).stock_ko;
    if(col==='cob'){const inv=getInv(r.mat),seg2=stockSeguridad[r.mat]||0;v=inv.media_mes>0?Math.round((inv.stock_ok-seg2)/inv.media_mes*10)/10:null;}
    if(v===null||v===undefined)v='—';
    s.add(String(v));
  });
  return [...s].sort((a,b)=>isNaN(a)||isNaN(b)?a.localeCompare(b):parseFloat(a)-parseFloat(b));
}

function getFilteredRows(){
  let rows=getAllRows();
  // global filters
  if(filterText){const t=filterText.toLowerCase();rows=rows.filter(r=>r.mat.toLowerCase().includes(t)||r.desc.toLowerCase().includes(t)||r.doc.toLowerCase().includes(t));}
  if(filterOrigen!=='all')rows=rows.filter(r=>r.origen===filterOrigen);
  if(filterAccion!=='all')rows=rows.filter(r=>{
    const a=getAccion(r);
    if(filterAccion==='expedir')return a.badge==='badge-expedir';
    if(filterAccion==='parcial')return a.badge==='badge-parcial';
    if(filterAccion==='reprocesar')return a.badge==='badge-reprocesar';
    if(filterAccion==='sinstock')return a.badge==='badge-sinstock';
    if(filterAccion==='revisar')return a.badge==='badge-revisar';
    return true;
  });
  if(filterMes)rows=rows.filter(r=>r.fecha===filterMes);
  // column filters
  Object.entries(colFilters).forEach(([col,sel])=>{
    if(!sel||sel.size===0)return;
    rows=rows.filter(r=>{
      let v=r[col];
      if(col==='seg')v=stockSeguridad[r.mat]||0;
      if(col==='stock_ok')v=getInv(r.mat).stock_ok;
      if(col==='stock_ko')v=getInv(r.mat).stock_ko;
      if(col==='cob'){const inv=getInv(r.mat),sg=stockSeguridad[r.mat]||0;v=inv.media_mes>0?Math.round((inv.stock_ok-sg)/inv.media_mes*10)/10:null;}
      if(v===null||v===undefined)v='—';
      return sel.has(String(v));
    });
  });
  return rows;
}

function toggleDropdown(col,btn){
  document.querySelectorAll('.col-dropdown').forEach(d=>{if(d.dataset.col!==col){d.classList.remove('open');}});
  const dd=document.querySelector(`.col-dropdown[data-col="${col}"]`);
  if(!dd)return;
  const isOpen=dd.classList.contains('open');
  dd.classList.toggle('open',!isOpen);
  if(!isOpen){
    const inp=dd.querySelector('input[type=text]');
    if(inp){inp.value='';filterDDList(col,'');}
    setTimeout(()=>inp&&inp.focus(),50);
  }
  openDropdown=isOpen?null:col;
}

function filterDDList(col,txt){
  const dd=document.querySelector(`.col-dropdown[data-col="${col}"]`);
  if(!dd)return;
  const items=dd.querySelectorAll('.col-dd-item');
  items.forEach(item=>{
    item.style.display=item.dataset.val.toLowerCase().includes(txt.toLowerCase())?'':'none';
  });
}

function toggleDDVal(col,val){
  if(!colFilters[col])colFilters[col]=new Set();
  if(colFilters[col].has(val))colFilters[col].delete(val);
  else colFilters[col].add(val);
  page=1;render();
}

function clearColFilter(col){
  delete colFilters[col];
  page=1;render();
}

function selectAllDD(col){
  const dd=document.querySelector(`.col-dropdown[data-col="${col}"]`);
  if(!dd)return;
  const visible=[...dd.querySelectorAll('.col-dd-item')].filter(i=>i.style.display!=='none').map(i=>i.dataset.val);
  if(!colFilters[col])colFilters[col]=new Set();
  visible.forEach(v=>colFilters[col].add(v));
  page=1;render();
}

document.addEventListener('click',e=>{
  if(!e.target.closest('th'))document.querySelectorAll('.col-dropdown').forEach(d=>d.classList.remove('open'));

// ---------- GUARDAR / CARGAR SESION ----------
function guardarSesion(){
  try{
    var session={
      pedidos: DB.pedidos,
      master: DB.master,
      inventory: DB.inventory,
      stockSeguridad: stockSeguridad,
      alertas: alertas,
      ts: new Date().toISOString()
    };
    localStorage.setItem('bormioli_session', JSON.stringify(session));
    var ok=document.getElementById('save-ok');
    if(ok){ok.style.display='inline';setTimeout(function(){ok.style.display='none';},2500);}
  }catch(e){
    // localStorage may be blocked when opening as file:// in Chrome
    var ok=document.getElementById('save-ok');
    if(ok){ok.textContent='⚠ Guardar no disponible en file://';ok.style.display='inline';ok.style.color='var(--warn)';}
  }
}

function cargarSesion(){
  try{
    var raw=localStorage.getItem('bormioli_session');
    if(!raw) return false;
    var session=JSON.parse(raw);
    if(session.pedidos) DB.pedidos=session.pedidos;
    if(session.master) DB.master=session.master;
    if(session.inventory) DB.inventory=session.inventory;
    if(session.stockSeguridad) stockSeguridad=session.stockSeguridad;
    if(session.alertas) alertas=session.alertas;
    return true;
  }catch(e){
    // Silently fail - localStorage blocked or empty
    return false;
  }
}

function updateDupCount(){
  const p=pendingImport;
  const allDups=[...p.newPedDups,...p.newMasDups];
  const sel=allDups.filter((_,i)=>{const c=document.getElementById('dup-chk-'+i);return c&&c.checked;}).length;
  const lbl=document.getElementById('dup-count-label');
  if(lbl)lbl.textContent=sel+' duplicado(s) seleccionado(s)';
}

function dupSelectAll(val){
  const p=pendingImport;
  const total=p.newPedDups.length+p.newMasDups.length;
  for(let i=0;i<total;i++){const c=document.getElementById('dup-chk-'+i);if(c)c.checked=val;}
  updateDupCount();
}

function closeDupModal(){
  const m=document.getElementById('dup-modal');if(m)m.remove();
  pendingImport=null;
}

function applyImportNoDups(){
  const p=pendingImport;
  const n=p.n;
  n.pedidos=p.newPedNew;
  n.master=p.newMasNew;
  DB=n;colFilters={};render();
  closeDupModal();
  alert('✔ Importadas '+n.pedidos.length+' líneas nuevas de pedidos + '+n.master.length+' líneas nuevas de Master.\nDuplicados omitidos: '+p.totalDups);
}

function applyImportWithSelected(){
  const p=pendingImport;
  const allDups=[...p.newPedDups,...p.newMasDups];
  const pedDupsSel=p.newPedDups.filter((_,i)=>{const c=document.getElementById('dup-chk-'+i);return c&&c.checked;});
  const masDupsSel=p.newMasDups.filter((_,i)=>{const ci=p.newPedDups.length+i;const c=document.getElementById('dup-chk-'+ci);return c&&c.checked;});
  const n=p.n;
  n.pedidos=[...p.newPedNew,...pedDupsSel];
  n.master=[...p.newMasNew,...masDupsSel];
  DB=n;colFilters={};render();
  closeDupModal();
  const selTotal=pedDupsSel.length+masDupsSel.length;
  alert('✔ Importadas '+n.pedidos.length+' líneas de pedidos + '+n.master.length+' líneas de Master.\n('+selTotal+' duplicados incluidos)');
}

// ---------- ACCION LOGIC ----------
function getAccion(r){
  const inv=getInv(r.mat);
  const seg=stockSeguridad[r.mat]||0;
  const stockDisp=inv.stock_ok-seg;  // stock disponible real
  const qty=r.qty;
  const cob=inv.media_mes>0?(inv.stock_ok-seg)/inv.media_mes:null;
  const tieneKO=inv.stock_ko>0;
  const cobBaja=cob!==null&&cob<alertas.a2;

  // Sin stock OK en absoluto
  if(inv.stock_ok===0){
    if(tieneKO){
      return{badge:'badge-reprocesar',label:'♻ Reprocesar',tip:'Sin stock OK · hay '+fmtNum(inv.stock_ko)+' uds KO disponibles'};
    }
    return{badge:'badge-sinstock',label:'⛔ Sin stock',tip:'Stock OK = 0 y sin KO disponible'};
  }

  // Stock OK cubre el pedido completo
  if(stockDisp>=qty){
    if(cobBaja&&tieneKO){
      return{badge:'badge-expedir',label:'✔ Expedir',tip:'Stock cubre pedido · cobertura baja ('+( cob!==null?cob.toFixed(1)+'m':'—')+') · considera reprocesar KO'};
    }
    return{badge:'badge-expedir',label:'✔ Expedir',tip:'Stock OK cubre el pedido completo ('+fmtNum(stockDisp)+' disp. vs '+fmtNum(qty)+' ped.)'};
  }

  // Stock OK parcial
  if(stockDisp>0&&stockDisp<qty){
    if(tieneKO){
      const faltante=qty-stockDisp;
      return{badge:'badge-reprocesar',label:'⚡ Parcial + Reprocesar',tip:'Expedir '+fmtNum(stockDisp)+' uds OK · faltan '+fmtNum(faltante)+' uds → reprocesar KO ('+fmtNum(inv.stock_ko)+' disp.)'};
    }
    return{badge:'badge-parcial',label:'⚠ Stock parcial',tip:'Solo '+fmtNum(stockDisp)+' uds disp. de '+fmtNum(qty)+' pedidas · sin KO'};
  }

  // Stock disponible <= 0 (por stock de seguridad)
  if(tieneKO){
    return{badge:'badge-reprocesar',label:'♻ Reprocesar',tip:'Stock reservado por seguridad · '+fmtNum(inv.stock_ko)+' uds KO disponibles para reprocesar'};
  }
  return{badge:'badge-revisar',label:'🔍 Revisar',tip:'Stock consumido por seg. ('+fmtNum(seg)+') · sin KO'};
}


// ---------- GROUPED ROWS ----------
function renderGroupedRows(rows){
  var groups={};
  rows.forEach(function(r){
    if(!groups[r.mat]) groups[r.mat]={mat:r.mat,desc:r.desc,rows:[],totalQty:0};
    groups[r.mat].rows.push(r);
    groups[r.mat].totalQty+=r.qty;
  });
  var out=[];
  Object.keys(groups).sort().forEach(function(mat){
    var g=groups[mat];
    var inv=getInv(mat);
    var seg=stockSeguridad[mat]||0;
    var stockDisp=inv.stock_ok-seg;
    var cob=inv.media_mes>0?(inv.stock_ok-seg)/inv.media_mes:null;
    var covW=cob!==null?Math.min(100,cob/Math.max(alertas.a3*1.5,12)*100):0;
    var gid='grp_'+mat.replace(/[^a-zA-Z0-9]/g,'_');
    var gAction;
    if(inv.stock_ok===0&&inv.stock_ko===0){gAction={badge:'badge-sinstock',label:'Sin stock',tip:'Sin stock OK ni KO'};}
    else if(inv.stock_ok===0){gAction={badge:'badge-reprocesar',label:'Reprocesar',tip:'Sin stock OK, KO: '+fmtNum(inv.stock_ko)};}
    else if(stockDisp>=g.totalQty){gAction={badge:'badge-expedir',label:'Expedir todo',tip:'Stock OK ('+fmtNum(stockDisp)+') cubre qty total ('+fmtNum(g.totalQty)+')' };}
    else if(stockDisp>0){gAction={badge:'badge-reprocesar',label:'Parcial+Reprocesar',tip:'Expedir '+fmtNum(stockDisp)+' faltan '+fmtNum(g.totalQty-stockDisp) };}
    else{gAction={badge:'badge-sinstock',label:'Sin stock',tip:'Stock agotado' };}
    var ac=inv.stock_ok===0?'al3':alertClass(cob);
    var cobCell=cob!==null?('<div class="cov-bar"><div class="cov-pill"><div class="cov-fill" style="width:'+covW+'%;background:'+covColor(cob)+'"></div></div><span class="mono" style="font-size:12px;color:'+covColor(cob)+';font-weight:700">'+cob.toFixed(1)+'m</span></div>'):'<span class="dim">-</span>';
    var tr='<tr class="group-row '+ac+'" id="'+gid+'">';
    tr+='<td><div class="group-toggle" data-gid="'+gid+'" onclick="toggleGroup(this)" style="cursor:pointer;display:flex;align-items:center;gap:6px"><span id="'+gid+'_arrow" style="font-size:10px">&#9654;</span><span class="g-mat">'+mat+'</span></div></td>';
    tr+='<td><span class="g-desc">'+g.desc+'</span></td>';
    tr+='<td style="text-align:center;font-size:11px;color:var(--text2)">'+g.rows.length+' lineas</td>';
    tr+='<td></td><td></td>';
    tr+='<td class="g-num" style="text-align:right;color:var(--bl-blue)">'+fmtNum(g.totalQty)+'</td>';
    tr+='<td class="g-num" style="text-align:right;color:var(--c-green)">'+fmtNum(inv.stock_ok)+'</td>';
    tr+='<td class="g-num" style="text-align:right;color:'+(inv.stock_ko>0?'var(--c-red)':'var(--text3)')+'">'+fmtNum(inv.stock_ko)+'</td>';
    tr+='<td class="g-num" style="text-align:right;color:var(--bl-gray)">'+(seg>0?fmtNum(seg):'-')+'</td>';
    tr+='<td>'+cobCell+'</td><td></td>';
    tr+='<td style="min-width:160px"><span class="'+gAction.badge+'">'+gAction.label+'</span><div class="action-tip">'+gAction.tip+'</div></td>';
    tr+='</tr>';
    out.push(tr);
    g.rows.forEach(function(r,ri){
      var rInv=getInv(r.mat);
      var rSeg=stockSeguridad[r.mat]||0;
      var rCob=rInv.media_mes>0?(rInv.stock_ok-rSeg)/rInv.media_mes:null;
      var rCovW=rCob!==null?Math.min(100,rCob/Math.max(alertas.a3*1.5,12)*100):0;
      var rAc=getAccion(r);
      var rRowAc=rInv.stock_ok===0?'al3':alertClass(rCob);
      var rCobCell=rCob!==null?('<div class="cov-bar"><div class="cov-pill"><div class="cov-fill" style="width:'+rCovW+'%;background:'+covColor(rCob)+'"></div></div><span class="mono" style="font-size:11px;color:'+covColor(rCob)+'">'+rCob.toFixed(1)+'m</span></div>'):'<span class="dim">-</span>';
      var estBadge=r.estado==='A'?'<span class="badge badge-open">Abierto</span>':(r.estado?'<span class="badge badge-gray">'+r.estado+'</span>':'');
      var orioBadge='<span class="badge '+(r.origen==='Pedidos'?'badge-ped':'badge-mas')+'" style="font-size:9px">'+(r.origen==='Pedidos'?'Clientes':'Master')+'</span>';
      var child='<tr class="child-row '+rRowAc+'" id="'+gid+'_r'+ri+'" style="display:none">';
      child+='<td class="mono" style="color:var(--bl-blue);font-size:10px;padding-left:28px">'+r.mat+'</td>';
      child+='<td style="font-size:11px;color:var(--text2)">'+r.desc+'</td>';
      child+='<td>'+orioBadge+'</td>';
      child+='<td class="mono dim" style="font-size:11px">'+r.doc+'</td>';
      child+='<td class="mono" style="font-size:11px;color:var(--text2)">'+r.fecha_raw+'</td>';
      child+='<td class="mono" style="text-align:right">'+fmtNum(r.qty)+'</td>';
      child+='<td class="mono" style="text-align:right;color:var(--c-green)">'+fmtNum(rInv.stock_ok)+'</td>';
      child+='<td class="mono" style="text-align:right;color:'+(rInv.stock_ko>0?'var(--c-red)':'var(--text3)')+'">'+fmtNum(rInv.stock_ko)+'</td>';
      child+='<td class="mono" style="text-align:right;color:var(--bl-gray)">'+(rSeg>0?fmtNum(rSeg):'-')+'</td>';
      child+='<td>'+rCobCell+'</td>';
      child+='<td>'+estBadge+'</td>';
      child+='<td style="min-width:160px"><span class="'+rAc.badge+'" style="font-size:9px">'+rAc.label+'</span><div class="action-tip">'+rAc.tip+'</div></td>';
      child+='</tr>';
      out.push(child);
    });
  });
  return out.join('');
}

function toggleGroup(el){
  var gid=el.dataset.gid;
  var rows=document.querySelectorAll('[id^="'+gid+'_r"]');
  var arrow=document.getElementById(gid+'_arrow');
  var isOpen=el.dataset.open==='1';
  rows.forEach(function(r){r.style.display=isOpen?'none':'';});
  if(arrow) arrow.innerHTML=isOpen?'&#9654;':'&#9660;';
  el.dataset.open=isOpen?'0':'1';
}

              <td>${cob!==null?`<div class="cov-bar"><div class="cov-pill"><div class="cov-fill" style="width:${covW}%;background:${covColor(cob)}"></div></div><span class="mono" style="font-size:11px;color:${covColor(cob)};font-weight:600">${cob.toFixed(1)}m</span></div>`:'<span class="dim">—</span>'}</td>
              <td>${r.estado==='A'?'<span class="badge badge-open">Abierto</span>':r.estado?`<span class="badge badge-gray">${r.estado}</span>`:''}</td>
              <td style="min-width:160px">${(()=>{const a=getAccion(r);return`<div><span class="${a.badge}">${a.label}</span><div class="action-tip">${a.tip}</div></div>`;})()}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="page-info">${(page-1)*pageSize+1}–${Math.min(page*pageSize,total)} de ${total}</span>
      <button class="page-btn" onclick="changePage(-1)" ${page<=1?'disabled':''}>‹</button>
      ${Array.from({length:Math.min(7,totalPages)},(_,i)=>{let p2=i+1;if(totalPages>7){if(page<=4)p2=i+1;else if(page>=totalPages-3)p2=totalPages-6+i;else p2=page-3+i;}return`<button class="page-btn ${page===p2?'active':''}" onclick="goPage(${p2})">${p2}</button>`;}).join('')}
      <button class="page-btn" onclick="changePage(1)" ${page>=totalPages?'disabled':''}>›</button>
    </div>`;
}

function cobToggleFilter(col,val){
  if(!cobColFilters[col])cobColFilters[col]=new Set();
  if(cobColFilters[col].has(val))cobColFilters[col].delete(val);
  else cobColFilters[col].add(val);
  render();
}

function cobClearFilter(col){
  delete cobColFilters[col];
  render();
}

function cobOpenFilter(col,btn){
  var existing=document.getElementById('cob-dd');
  if(existing){if(existing.dataset.col===col){existing.remove();return;}existing.remove();}
  // Build values
  var s=new Set();
  var tnG={};getAZQ().forEach(function(a){if(!tnG[a.tn])tnG[a.tn]={defs:[],provs:[]};if(a.tipo==='DEFINITIVO')tnG[a.tn].defs.push(a);else tnG[a.tn].provs.push(a);});
  var pbm={};getAllRows().forEach(function(r){if(!pbm[r.mat])pbm[r.mat]=0;pbm[r.mat]+=r.qty;});
  Object.keys(tnG).forEach(function(tn){
    var g=tnG[tn];
    g.defs.filter(function(d){return d.mto==='MTS';}).forEach(function(a){
      var ped=pbm[a.mat]||0;
      var cob=a.media>0?a.ok/a.media:null;
      var v=col==='mat'?a.mat:col==='desc'?a.desc:col==='tn'?tn:col==='ok'?fmtNum(a.ok):col==='ko'?fmtNum(a.ko):col==='ped'?(ped>0?fmtNum(ped):'-'):col==='media'?fmtNum(a.media):col==='cob'?(cob!==null?cob.toFixed(1)+'m':'-'):'';
      if(v)s.add(String(v));
    });
  });
  var vals=Array.from(s).sort(function(a,b){var na=parseFloat(a.replace(/[^0-9.-]/g,'')),nb=parseFloat(b.replace(/[^0-9.-]/g,''));return(!isNaN(na)&&!isNaN(nb))?(na-nb):a.localeCompare(b);});
  var sel=cobColFilters[col]||new Set();
  // Build dropdown
  var dd=document.createElement('div');
  dd.id='cob-dd';dd.dataset.col=col;
  dd.className='col-dropdown open';
  var rect=btn.getBoundingClientRect();
  dd.style.cssText='position:fixed;z-index:1000;top:'+(rect.bottom+2)+'px;left:'+Math.min(rect.left,window.innerWidth-200)+'px';
  var rows=vals.map(function(v){
    var chk=sel.has(v)?'checked':'';
    return '<div class="col-dd-item" data-v="'+v+'"><input type="checkbox" '+chk+' onclick="event.stopPropagation()"> '+v+'</div>';
  }).join('');
  dd.innerHTML='<div style="padding:5px 8px 2px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase">'+col+'</div>'+rows+'<div class="col-dd-actions"><button class="btn" style="font-size:10px;padding:3px 8px" id="cob-dd-clear">Limpiar</button></div>';
  document.body.appendChild(dd);
  // Handle checkbox clicks
  dd.querySelectorAll('.col-dd-item').forEach(function(item){
    item.addEventListener('click',function(e){
      e.stopPropagation();
      var v=item.dataset.v;
      var chk=item.querySelector('input');
      chk.checked=!chk.checked;
      cobToggleFilter(col,v);
    });
  });
  document.getElementById('cob-dd-clear').addEventListener('click',function(e){
    e.stopPropagation();cobClearFilter(col);
  });
  setTimeout(function(){
    document.addEventListener('click',function rm(){var d=document.getElementById('cob-dd');if(d)d.remove();document.removeEventListener('click',rm);});
  },100);
}

function cobExportDetail(tipo){
  var defs=getAZQ().filter(function(a){return a.tipo==='DEFINITIVO'&&a.mto==='MTS';});
  var provs=getAZQ().filter(function(a){return a.tipo==='PROVISIONAL';});

  else if(tipo==='ko'){items=defs.filter(function(a){return a.ko>0;});sheetName='Definitivos con KO';}

  var wb=XLSX.utils.book_new();

function renderCobertura(){
  renderKPICobertura();
  var txt=cobFilterTxt.toLowerCase();
  var pedByMat={};
  getAllRows().forEach(function(r){
    if(!pedByMat[r.mat])pedByMat[r.mat]={totalQty:0};
    pedByMat[r.mat].totalQty+=r.qty;
  });
  var tnGroups={};
  getAZQ().forEach(function(a){
    if(!tnGroups[a.tn])tnGroups[a.tn]={tn:a.tn,defs:[],provs:[]};
    if(a.tipo==='DEFINITIVO')tnGroups[a.tn].defs.push(a);
    else tnGroups[a.tn].provs.push(a);
  });
  var tnKeys=Object.keys(tnGroups).filter(function(tn){
    var g=tnGroups[tn];
    if(g.defs.length===0)return false;
    if(!g.defs.some(function(d){return d.mto==='MTS';}))return false;
    if(txt&&!tn.toLowerCase().includes(txt)&&!g.defs.concat(g.provs).some(function(a){
      return a.mat.toLowerCase().includes(txt)||a.desc.toLowerCase().includes(txt);
    }))return false;
    return true;
  }).sort();

  var totalDefs=0,sinStock=0,bajoObjetivo=0,okObjetivo=0,totalRepro=0;
  Object.keys(tnGroups).forEach(function(tn){
    var g=tnGroups[tn];
    if(g.defs.length===0)return;
    var pOK=g.provs.reduce(function(s,x){return s+x.ok;},0);
    var pKO=g.provs.reduce(function(s,x){return s+x.ko;},0);
    g.defs.forEach(function(a){
      if(a.mto!=='MTS')return;
      totalDefs++;
      var cob=a.media>0?a.ok/a.media:null;
      if(a.ok===0)sinStock++;
      else if(cob!==null&&cob<cobTargetMeses)bajoObjetivo++;
      else okObjetivo++;
      var needed=cobTargetMeses*a.media-a.ok;
      if(needed>0){var avail=a.ko+pOK+pKO;if(avail>0)totalRepro+=Math.min(needed,avail);}
    });
  });

  // Build sortable flat rows
  var allDefRows=[];
  tnKeys.forEach(function(tn){
    var g=tnGroups[tn];
    var mtsDefs2=g.defs.filter(function(d){return d.mto==='MTS';});
    mtsDefs2.forEach(function(a,ai){
      var ped=pedByMat[a.mat]?pedByMat[a.mat].totalQty:0;
      var cob=a.media>0?a.ok/a.media:null;
      // Use proportional/manual reparto for this specific definitivo
      var asig=getProvAsignados(tnGroups,tn,a.mat);
      var provOK2=asig.ok,provKO2=asig.ko;
      if(cobRowMatchesFilters(a,tn,ped,cob))
        allDefRows.push({a:a,tn:tn,g:g,ai:ai,ped:ped,cob:cob,provOK:provOK2,provKO:provKO2,provTotal:provOK2+provKO2});
    });
  });
  allDefRows.sort(function(x,y){
    var av,bv;
    if(cobSortCol==='mat'){av=x.a.mat;bv=y.a.mat;}
    else if(cobSortCol==='desc'){av=x.a.desc;bv=y.a.desc;}
    else if(cobSortCol==='tn'){av=x.tn;bv=y.tn;}
    else if(cobSortCol==='ok'){av=x.a.ok;bv=y.a.ok;}
    else if(cobSortCol==='ko'){av=x.a.ko;bv=y.a.ko;}
    else if(cobSortCol==='ped'){av=x.ped;bv=y.ped;}
    else if(cobSortCol==='media'){av=x.a.media;bv=y.a.media;}
    else if(cobSortCol==='cob'){av=x.cob!==null?x.cob:-999;bv=y.cob!==null?y.cob:-999;}
    else{av=x.a.mat;bv=y.a.mat;}
    if(typeof av==='number')return cobSortDir*(av-bv);
    return cobSortDir*String(av||'').localeCompare(String(bv||''));
  });

  var out='';
  // Top bar
  out+='<div style="background:#fff;border:1px solid var(--border);border-radius:7px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  out+='<input type="text" placeholder="Buscar codigo, Trade Name..." value="'+cobFilterTxt+'" id="cob-search-inp" oninput="cobFilterTxt=this.value;cobDebouncedRender()" style="width:210px">';
  out+='<div style="display:flex;align-items:center;gap:5px;padding-left:10px;border-left:1px solid var(--border)">';
  out+='<span style="font-size:11px;color:var(--text2);font-weight:600">Objetivo:</span>';
  out+='<input class="cob-config-inp" type="number" min="1" max="36" value="'+cobTargetMeses+'" oninput="cobTargetMeses=parseFloat(this.value)||6;render()" style="width:52px">';
  out+='<span style="font-size:11px;color:var(--text2)">meses</span>';
  out+='</div>';
  out+='<div class="cob-stat-badge ok" style="font-size:10px;padding:3px 8px">&#10004; '+okObjetivo+' OK</div>';
  out+='<div class="cob-stat-badge warn" style="font-size:10px;padding:3px 8px">&#9650; '+bajoObjetivo+' bajo obj.</div>';
  out+='<div class="cob-stat-badge danger" style="font-size:10px;padding:3px 8px">&#9940; '+sinStock+' sin stock</div>';
  if(totalRepro>0)out+='<div class="cob-stat-badge info" style="font-size:10px;padding:3px 8px">&#9851; '+fmtNum(Math.round(totalRepro))+' a reprocesar</div>';
  out+='<div style="margin-left:auto;display:flex;gap:8px;align-items:center">';
  out+='<span style="font-size:11px;color:var(--text2);font-family:DM Mono,monospace">'+tnKeys.length+' TN &middot; '+totalDefs+' def. MTS</span>';
  out+='<button class="btn" onclick="exportExcel()">&#8595; Excel</button>';
  out+='</div></div>';

  // Table
  out+='<div class="table-wrap" style="max-height:calc(100vh - 300px)">';
  out+='<table style="table-layout:fixed;width:100%"><thead><tr>';
  out+=cobThW('mat','CODICE ARTICOLO',148);
  out+=cobThW('desc','DESCRIZIONE',175);
  out+=cobThW('tn','TRADE NAME',125);
  out+=cobThW('ok','STOCK OK',90,'right');
  out+=cobThW('ko','STOCK KO',90,'right');
  out+=cobThW('ped','PEDIDOS',75,'right');
  out+=cobThW('media','MEDIA/M',65,'right');
  out+=cobThW('cob','COBERTURA',110);
  out+='<th style="width:185px">REPROCESAR</th>';
  out+='<th style="width:95px">ACCION</th>';
  out+='</tr></thead><tbody>';

  var shownProvTNs={};
  allDefRows.forEach(function(row){
    var a=row.a,tn=row.tn,g=row.g,ped=row.ped,cob=row.cob;

function cobRowMatchesFilters(a,tn,ped,cob){
  return Object.keys(cobColFilters).every(function(col){
    var fset=cobColFilters[col];
    if(!fset||fset.size===0)return true;
    var v;
    if(col==='mat')v=a.mat;
    else if(col==='desc')v=a.desc;
    else if(col==='tn')v=tn;
    else if(col==='ok')v=fmtNum(a.ok);
    else if(col==='ko')v=fmtNum(a.ko);
    else if(col==='ped')v=ped>0?fmtNum(ped):'-';
    else if(col==='media')v=fmtNum(a.media);
    else if(col==='cob')v=cob!==null?cob.toFixed(1)+'m':'-';
    else return true;
    return fset.has(String(v));
  });
}

function cobThW(col,label,w,align){
  var sorted=cobSortCol===col;
  var arrow=sorted?(cobSortDir>0?' &uarr;':' &darr;'):'';
  var hasFilter=cobColFilters[col]&&cobColFilters[col].size>0;
  var st='width:'+w+'px;'+(align==='right'?'text-align:right;':'');
  var filterBtn='<span class="col-filter-btn'+(hasFilter?' active':'')+'" data-filtercol="'+col+'" style="float:right;margin:4px 2px 0 4px;font-size:9px">&#9660;</span>';
  return '<th style="'+st+'cursor:pointer" data-sort="'+col+'">'+filterBtn+label+arrow+'</th>';
}

  html2+='</div>';

  // === STOCK DE SEGURIDAD ===
  html2+='<div class="config-section"><h3>Stock de seguridad por articulo</h3>';

function segItemHtml(mat,desc){
  var seg=stockSeguridad[mat]||'';
  return '<div class="seg-item" id="seg-'+mat+'">'+
    '<div class="seg-mat">'+mat+'</div>'+
    '<div class="seg-name" title="'+desc+'">'+desc+'</div>'+
    '<input type="text" class="seg-input" value="'+seg+'" placeholder="0" oninput="stockSeguridad[\''+mat+'\']=parseFloat(this.value)||0" onblur="renderKPI()">'+
    '<button class="seg-del" onclick="delSegRow(\''+mat+'\')">x</button>'+
    '</div>';
}

function renderSegSearch(txt){
  var mats={};getAllRows().forEach(function(r){mats[r.mat]=r.desc;});
  var t=txt?txt.toLowerCase():'';
  var filtered=Object.keys(stockSeguridad).filter(function(m){return !t||m.toLowerCase().includes(t)||( mats[m]&&mats[m].toLowerCase().includes(t));}).sort();
  var g=document.getElementById('seg-grid');if(!g)return;
  g.innerHTML=filtered.length===0?'<div style="padding:16px;color:var(--text2);font-size:12px">No hay articulos anadidos.</div>':filtered.map(function(m){return segItemHtml(m,mats[m]||'');}).join('');
}

function addSegRow(){
  var mat=prompt('Codigo de articulo (11 o 15 caracteres):');
  if(!mat||![11,15].includes(mat.trim().length)){alert('El codigo debe tener 11 o 15 caracteres.');return;}
  var m=mat.trim();
  if(!DB.inventory[m])DB.inventory[m]={desc:'',stock_ok:0,stock_ko:0,media_mes:0};
  stockSeguridad[m]=0;
  renderConfig();
}

function delSegRow(mat){
  delete stockSeguridad[mat];renderKPI();
  var el=document.getElementById('seg-'+mat);if(el)el.remove();
}

function exportSegExcel(){
  var rows=[['Cod. Articulo','Descripcion','Stock Seguridad']];
  var mats={};getAllRows().forEach(function(r){mats[r.mat]=r.desc;});
  Object.keys(stockSeguridad).forEach(function(m){rows.push([m,mats[m]||'',stockSeguridad[m]]);});
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'Stock Seguridad');
  XLSX.writeFile(wb,'StockSeguridad.xlsx');
}


// ---------- PASTE TABLE ----------
function renderPasteTable(){
  var tbody=document.getElementById('paste-tbody');
  if(!tbody)return;
  tbody.innerHTML=pasteRows.map(function(r,i){
    return '<tr>'+
      '<td><input value="'+(r.mat||'')+'" oninput="pasteRows['+i+'].mat=this.value" placeholder="490440FUG121990" style="width:140px"></td>'+
      '<td><input value="'+(r.desc||'')+'" oninput="pasteRows['+i+'].desc=this.value" placeholder="Descripcion..." style="width:100%"></td>'+
      '<td><input value="'+(r.qty||'')+'" oninput="pasteRows['+i+'].qty=this.value" placeholder="0" style="width:78px;text-align:right"></td>'+
      '<td><input value="'+(r.pz||'')+'" oninput="pasteRows['+i+'].pz=this.value" placeholder="0" style="width:68px;text-align:right"></td>'+
      '<td><button class="seg-del" onclick="pasteRows.splice('+i+',1);renderPasteTable()">x</button></td>'+
      '</tr>';
  }).join('');
  tbody.querySelectorAll('input').forEach(function(inp){
    inp.addEventListener('paste',function(e){
      var txt=e.clipboardData.getData('text');
      var lines=txt.trim().split('\n');
      if(lines.length<=1)return;
      e.preventDefault();
      var rowIdx=parseInt(inp.closest('tr').rowIndex)-1;
      lines.forEach(function(line,li){
        var cols=line.split('\t');
        var idx=rowIdx+li;
        if(idx>=pasteRows.length)pasteRows.push({mat:'',desc:'',qty:'',pz:''});
        if(cols[0]!==undefined)pasteRows[idx].mat=cols[0].trim();
        if(cols[1]!==undefined)pasteRows[idx].desc=cols[1].trim();
        if(cols[2]!==undefined)pasteRows[idx].qty=cols[2].trim();
        if(cols[3]!==undefined)pasteRows[idx].pz=cols[3].trim();
      });
      renderPasteTable();
    });
  });
}

function addPasteRow(){pasteRows.push({mat:'',desc:'',qty:'',pz:''});renderPasteTable();}

function clearPaste(){pasteRows=[{mat:'',desc:'',qty:'',pz:''}];renderPasteTable();}

function applyPaste(){
  var added=0;
  pasteRows.forEach(function(r){
    var mat=String(r.mat||'').trim();
    if(!mat||![11,15].includes(mat.length))return;
    var qty=parseFloat(r.qty)||0;
    if(!DB.inventory[mat])DB.inventory[mat]={desc:r.desc||'',stock_ok:0,stock_ko:0,media_mes:0};
    stockSeguridad[mat]=qty;
    added++;
  });
  alert(added+' articulo(s) aplicados al stock de seguridad.');
  pasteRows=[{mat:'',desc:'',qty:'',pz:''}];
  renderConfig();renderKPI();
}


function setRepartoManual(tn,mat,val){
  if(!repartoManual[tn])repartoManual[tn]={};
  var v=parseFloat(val);
  if(!isNaN(v)&&v>=0&&v<=100)repartoManual[tn][mat]=v;
  else delete repartoManual[tn][mat];
}

function resetRepartoTN(tn){
  delete repartoManual[tn];
  renderConfig();
}

function reasignarTodo(tn,mat){
  var g={defs:[]};
  getAZQ().forEach(function(a){if(a.tn===tn&&a.tipo==='DEFINITIVO'&&a.mto==='MTS')g.defs.push(a);});
  if(!repartoManual[tn])repartoManual[tn]={};
  g.defs.forEach(function(a){repartoManual[tn][a.mat]=a.mat===mat?100:0;});
  renderConfig();
}

// Get provisionales assigned to a specific definitivo (used in cobertura calc)
function getProvAsignados(tnGroups,tn,mat){
  var g=tnGroups[tn]||{defs:[],provs:[]};
  var provOK=g.provs.reduce(function(s,a){return s+a.ok;},0);
  var provKO=g.provs.reduce(function(s,a){return s+a.ko;},0);
  var rm=repartoManual[tn]||{};
  var defs=g.defs.filter(function(d){return d.mto==='MTS';});
  if(defs.length===0)return {ok:provOK,ko:provKO};
  // Calculate % for this mat
  var totalMedia=defs.reduce(function(s,a){return s+a.media;},0);
  var pctManual=rm[mat];
  var pct;
  if(pctManual!==undefined){pct=pctManual/100;}
  else{var a=defs.find(function(d){return d.mat===mat;});pct=totalMedia>0?(a?a.media/totalMedia:0):1/defs.length;}
  return {ok:Math.round(provOK*pct),ko:Math.round(provKO*pct)};
}

function toggleVajDetail(cod){
  var el=document.getElementById('vaj-detail-'+cod);
  if(el)el.style.display=el.style.display==='table-row'?'none':'table-row';
}

function deleteVajilla(cod){
  if(confirm('Eliminar vajilla '+cod+'?')){delete vajillas[cod];renderConfig();}
}

function showAddVajilla(){
  var cod=prompt('Codigo del articulo vajilla (ej: 490450SVH021990):');
  if(!cod||!cod.trim())return;
  cod=cod.trim();
  var desc=prompt('Descripcion de la vajilla:');
  if(!desc)return;
  vajillas[cod]={desc:desc.trim(),componentes:[]};

function exportVajillasExcel(){
  var rows=[['Cod. Vajilla','Descripcion','Trade Name comp.','Desc. componente','Qty/vajilla','Stock OK TN','Vajillas posibles']];
  var stockByTN={};
  getAZQ().forEach(function(a){if(!stockByTN[a.tn])stockByTN[a.tn]=0;stockByTN[a.tn]+=a.ok;});
  Object.keys(vajillas).forEach(function(cod){
    var vaj=vajillas[cod];
    var minVaj=Infinity;
    vaj.componentes.forEach(function(c){var st=stockByTN[c.tn]||0;var p=c.qty>0?Math.floor(st/c.qty):Infinity;if(p<minVaj)minVaj=p;});
    if(minVaj===Infinity)minVaj=0;
    vaj.componentes.forEach(function(c,i){
      var st=stockByTN[c.tn]||0;
      rows.push([i===0?cod:'',i===0?vaj.desc:'',c.tn,c.desc,c.qty,st,i===0?minVaj:'']);
    });
  });
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'Vajillas');
  XLSX.writeFile(wb,'Bormioli_Vajillas.xlsx');
}



// vajillaPct: { tn: pct } - % of sobrante to assign to vajillas (Option D)
var vajillaPct = {};

function setVajillaPct(tn, val) {
  var v = parseFloat(val);
  if (!isNaN(v) && v >= 0 && v <= 100) vajillaPct[tn] = v;
  else delete vajillaPct[tn];
}


// ============================================================
// VAJILLAS - STOCK CALCULATION
// ============================================================

// Calculate available stock for a given TN as a vajilla component
// Returns: { directo, conReproceso, reservasDefs, detalle }
function calcStockTNParaVajilla(tn) {
  var tnData = { defs: [], provs: [] };
  getAZQ().forEach(function(a) {
    if (a.tn !== tn) return;
    if (a.tipo === 'DEFINITIVO') tnData.defs.push(a);
    else tnData.provs.push(a);
  });

  // Total directo: Def.OK + Prov.OK (both valid without reprocessing)
  var defOK   = tnData.defs.reduce(function(s,a){ return s+a.ok; }, 0);
  var defKO   = tnData.defs.reduce(function(s,a){ return s+a.ko; }, 0);
  var provOK  = tnData.provs.reduce(function(s,a){ return s+a.ok; }, 0);
  var provKO  = tnData.provs.reduce(function(s,a){ return s+a.ko; }, 0);
  var totalDirecto = defOK + provOK;

  // Sort definitivos by media DESC (highest sales priority first)
  var defs = tnData.defs.slice().sort(function(a,b){ return b.media - a.media; });

  // Reserve for each definitivo up to objective (Option C)
  var stockRestante = totalDirecto;
  var reservasDefs = [];
  defs.forEach(function(a) {
    var necesita = cobTargetMeses * a.media;
    // Check manual override for this TN
    var rm = repartoManual[tn] || {};
    var pctManual = rm[a.mat];
    var reserva;
    if (pctManual !== undefined) {
      // Manual: reserve this % of total directo
      reserva = Math.round(totalDirecto * pctManual / 100);
    } else {
      // Option C: reserve up to objective, first come first served by sales
      reserva = Math.min(stockRestante, necesita);
    }
    reserva = Math.max(0, reserva);
    stockRestante -= reserva;
    reservasDefs.push({ mat: a.mat, desc: a.desc, media: a.media, necesita: necesita, reservado: reserva });
  });

  var sobrante = Math.max(0, stockRestante);

  // Check if there's a manual vajilla % override for this TN
  var vajPct = vajillaPct[tn] !== undefined ? vajillaPct[tn] : 100; // default: all sobrante to vajilla
  var disponibleVajilla = Math.round(sobrante * vajPct / 100);

  // With reprocessing: also add Prov.KO sobrante
  // Def.KO stays with its own definitivo only
  var provKOSobrante = provKO; // all prov.KO can go to vajilla after reprocessing
  var disponibleConRepro = disponibleVajilla + provKOSobrante;

  return {
    defOK: defOK, defKO: defKO, provOK: provOK, provKO: provKO,
    totalDirecto: totalDirecto,
    reservasDefs: reservasDefs,
    sobrante: sobrante,
    vajPct: vajPct,
    disponibleVajilla: disponibleVajilla,
    disponibleConRepro: disponibleConRepro
  };
}

// Calculate how many complete vajillas can be assembled
// Returns { posiblesDirecto, posiblesConRepro, componentesDirecto, componentesConRepro }
function calcVajillasDisponibles(cod) {
  var vaj = vajillas[cod];
  if (!vaj) return { posiblesDirecto: 0, posiblesConRepro: 0 };

  var minDirecto = Infinity;
  var minConRepro = Infinity;
  var componentesDirecto = [];
  var componentesConRepro = [];

  vaj.componentes.forEach(function(c) {
    var calc = calcStockTNParaVajilla(c.tn);
    var posD = c.qty > 0 ? Math.floor(calc.disponibleVajilla / c.qty) : Infinity;
    var posR = c.qty > 0 ? Math.floor(calc.disponibleConRepro / c.qty) : Infinity;

    if (posD < minDirecto) minDirecto = posD;
    if (posR < minConRepro) minConRepro = posR;

    componentesDirecto.push({
      tn: c.tn, desc: c.desc, qty: c.qty,
      disponible: calc.disponibleVajilla,
      posibles: posD,
      sobrante: calc.sobrante,
      reservasDefs: calc.reservasDefs,
      vajPct: calc.vajPct,
      calc: calc
    });
    componentesConRepro.push({
      tn: c.tn, desc: c.desc, qty: c.qty,
      disponible: calc.disponibleConRepro,
      posibles: posR,
      provKO: calc.provKO
    });
  });

  if (minDirecto === Infinity) minDirecto = 0;
  if (minConRepro === Infinity) minConRepro = 0;

  return {
    posiblesDirecto: minDirecto,
    posiblesConRepro: minConRepro,
    componentesDirecto: componentesDirecto,
    componentesConRepro: componentesConRepro
  };
}
